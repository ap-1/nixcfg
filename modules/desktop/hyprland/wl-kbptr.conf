selectable_border_color=#cba6f7
unselectable_bg_color=#11111baa
label_color=#cdd6f4
label_select_color=#f9e2af

[mode_split]
pointer_color=#f38ba8
bg_color=#1e1e2e66
area_bg_color=#18182588
vertical_color=#cba6f7cc
horizontal_color=#a6e3a1cc
history_border_color=#6c7086
