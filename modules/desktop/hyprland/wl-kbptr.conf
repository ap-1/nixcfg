# Catppuccin Mocha
# mauve    #cba6f7  borders, split vertical
# text     #cdd6f4  labels
# yellow   #f9e2af  typed match
# base     #1e1e2e  selectable box bg
# mantle   #181825  split area bg
# crust    #11111b  dimmed box bg
# green    #a6e3a1  split horizontal
# red      #f38ba8  split pointer
# overlay0 #6c7086  split history border

[mode_floating]
